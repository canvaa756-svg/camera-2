<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Scan Hiro + Gambar</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- AR.js -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family: Arial; }

.controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 10;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    font-weight: bold;
}

#start { background: green; color: white; }
#stop { background: red; color: white; }

.status {
    position: fixed;
    top: 10px;
    right: 10px;
    background: black;
    color: lime;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 10;
}
</style>
</head>

<body>

<div class="status" id="status">SCAN OFF</div>

<div class="controls">
    <button onclick="startScan()">Start</button>
    <button onclick="stopScan()">Stop</button>
</div>

<a-scene id="scene"
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

    <!-- 🔴 MARKER HIRO -->
    <a-marker preset="hiro" id="hiroMarker">
        <a-box color="red" position="0 0.5 0"></a-box>
        <a-text value="Hiro Detected!" position="0 1 0" align="center"></a-text>
    </a-marker>

    <!-- 🔵 MARKER GAMBAR (CUSTOM) -->
    <!-- GANTI URL .patt dengan punyamu -->
    <a-marker type="pattern" url="pattern-marker.patt" id="imgMarker">
        <a-sphere color="blue" radius="0.4" position="0 0.5 0"></a-sphere>
        <a-text value="Gambar Terdeteksi!" position="0 1 0" align="center"></a-text>
    </a-marker>

    <!-- kamera -->
    <a-entity camera></a-entity>

</a-scene>

<script>
let statusText = document.getElementById("status");
let scene = document.getElementById("scene");

scene.style.display = "none";

/* START */
function startScan(){
    scene.style.display = "block";
    statusText.innerHTML = "SCAN ON";
}

/* STOP */
function stopScan(){
    scene.style.display = "none";
    statusText.innerHTML = "SCAN OFF";
}

/* EVENT HIRO */
document.getElementById("hiroMarker").addEventListener("markerFound", () => {
    statusText.innerHTML = "HIRO TERDETEKSI";
});

/* EVENT GAMBAR */
document.getElementById("imgMarker").addEventListener("markerFound", () => {
    statusText.innerHTML = "GAMBAR TERDETEKSI";
});
</script>

</body>
</html>
